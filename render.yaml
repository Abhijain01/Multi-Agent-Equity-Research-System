# render.yaml — Infrastructure-as-code for the backend deploy.
#
# This monorepo has backend/ and frontend/ side by side. Render only needs
# this file — it builds from the REPO ROOT (not the backend/ folder) because
# backend/Dockerfile does `COPY alphaagents/ ./alphaagents/` and
# `COPY backend/ ./backend/`, both relative to repo root. Do NOT set a
# "Root Directory" in Render's UI for this service — leave it blank so the
# build context stays at repo root; only `dockerfilePath` points into backend/.
#
# To use: Render dashboard → New → Blueprint → point at this repo.
# Render will read this file and create the service automatically.

services:
  - type: web
    name: finpilot-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      # Required — the app will fail to gather data without these
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      # Optional — Langfuse tracing degrades gracefully if left unset,
      # see alphaagents/utils/tracing.py
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com